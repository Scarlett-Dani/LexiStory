<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiStory - AI 语境单词学习</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #a855f7;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            --sidebar-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg-gradient); 
            color: #1e293b; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* --- 侧边栏 --- */
        aside { 
            width: 280px; 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .logo-area { padding: 40px 30px; }
        .logo-area h1 { 
            font-size: 26px; 
            font-weight: 900; 
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .nav-item { 
            padding: 12px 15px; 
            border-radius: 14px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            transition: all 0.2s;
            font-size: 13px; 
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: rgba(99, 102, 241, 0.2); color: white; border-left: 3px solid var(--primary); }
        
        .item-actions { display: flex; gap: 8px; opacity: 0; transition: 0.2s; }
        .nav-item:hover .item-actions { opacity: 1; }
        .action-icon { padding: 4px; border-radius: 6px; transition: 0.2s; font-size: 14px; }
        .action-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }

        .section-label { font-size: 11px; color: #475569; font-weight: 800; margin: 20px 0 10px 15px; letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-footer { padding: 25px; border-top: 1px solid rgba(255,255,255,0.05); }

        /* --- 按钮 & 核心组件 --- */
        .btn-primary { 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; border: none; padding: 16px; border-radius: 18px; 
            font-weight: 700; cursor: pointer; width: 100%; transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        .btn-outline { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,0,0,0.1); 
            color: #475569; padding: 12px; border-radius: 16px; cursor: pointer; 
            width: 100%; margin-top: 10px; font-weight: 600; transition: 0.3s;
        }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { 
            height: 80px; background: rgba(255,255,255,0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; z-index: 50;
        }
        header h2 { font-weight: 800; color: #0f172a; font-size: 20px; }

        .content-area { flex: 1; overflow-y: auto; padding: 40px; }
        .card { 
            background: var(--glass); border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); 
            padding: 40px; max-width: 850px; margin: 20px auto; 
            border: 1px solid white;
        }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 14px; color: #475569; }
        input, select, textarea { 
            width: 100%; padding: 15px 20px; border: 2px solid #f1f5f9; background: #f8fafc;
            border-radius: 18px; outline: none; transition: 0.3s; font-size: 15px;
        }

        .word-highlight { color: var(--primary); font-weight: 800; border-bottom: 3px solid #e0e7ff; }
        .hidden { display: none !important; }
        
        /* --- 拼图/练习区域 --- */
        .drop-zone { 
            min-width: 80px; height: 32px; border-bottom: 3px solid #cbd5e1; 
            display: inline-flex; align-items: center; justify-content: center;
            background: #f1f5f9; vertical-align: middle; margin: 0 5px; border-radius: 8px; 
            transition: 0.3s;
        }
        .word-card { 
            display: inline-block; padding: 10px 20px; background: white; 
            border: 1px solid #e2e8f0; border-radius: 14px; margin: 6px; cursor: grab; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: 700; color: #334155;
        }

        .spinner { 
            width: 60px; height: 60px; border: 6px solid #f3f3f3; 
            border-top: 6px solid var(--primary); border-radius: 50%;
            animation: spin 1s infinite linear; margin: 40px auto; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .book-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 25px; }
        .book-slot {
            background: #ffffff; border-radius: 24px; padding: 25px;
            border: 2px solid #f1f5f9; height: 130px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            position: relative; transition: all 0.3s; cursor: pointer;
        }
        .delete-book { position: absolute; top: 12px; right: 12px; background: #fee2e2; color: #ef4444; border: none; width: 28px; height: 28px; border-radius: 10px; cursor: pointer; opacity: 0; }
        .book-slot:hover .delete-book { opacity: 1; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-area"><h1>LexiStory</h1></div>
        <div class="nav-list" id="historyList">
            <div class="section-label">📅 记忆历程</div>
        </div>
        <div class="sidebar-footer">
            <button class="btn-primary" onclick="showSection('config')">✨ 新学习</button>
            <button class="btn-outline" onclick="showSection('settings')" style="color:#94a3b8">⚙️ 系统设置</button>
        </div>
    </aside>

    <main>
        <header>
            <h2 id="headerTitle">准备开启学习</h2>
            <div id="apiStatusBadge" style="font-size: 11px; font-weight: 900; padding: 6px 12px; border-radius: 30px;">API 未连接</div>
        </header>

        <div class="content-area" id="scrollArea">
            
            <section id="importSection" class="hidden">
                <div class="card" style="text-align: center;">
                    <div style="font-size: 64px; margin-bottom: 20px;">📘</div>
                    <h2 style="margin-bottom: 10px;">上传你的词库</h2>
                    <input type="file" id="fileInput" style="display: none;">
                    <button class="btn-primary" style="max-width: 260px;" onclick="document.getElementById('fileInput').click()">选择本地文本文件</button>
                </div>
            </section>

            <section id="configSection" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom: 25px;">定制学习场景</h3>
                    <div class="input-group">
                        <label>AI 模型选择💻</label>
                        <select id="modelSelect">
                            <option value="deepseek-ai/DeepSeek-V3">DeepSeek V3 (平衡、快速)</option>
                            <option value="deepseek-ai/DeepSeek-R1">DeepSeek R1 (深度推理、逻辑严密)</option>
                            <option value="Qwen/Qwen2.5-72B-Instruct">Qwen 2.5 72B (中文语感好)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>挑战单词数📍 (范围: 10-60)</label>
                        <input type="number" id="wordNum" value="10" min="10" max="60">
                    </div>
                    <div class="input-group">
                        <label>叙事风格🪄</label>
                        <select id="storyStyle" onchange="toggleCustomStyle(this.value)">
                            <option value="Fairytale">💕 治愈童话</option>
                            <option value="Sci-Fi">🚀 宇宙科幻</option>
                            <option value="Cyberpunk">🌃 赛博朋克</option>
                            <option value="Mystery">🕵️ 悬疑探案</option>
                            <option value="custom">✍️ 自定义风格...</option>
                        </select>
                        <input type="text" id="customStyleInput" class="hidden" placeholder="描述你想要的风格..." style="margin-top: 10px;">
                    </div>
                    <div class="input-group">
                        <label>故事篇幅📃</label>
                        <select id="storyLength">
                            <option value="short">📜 短篇</option>
                            <option value="medium" selected>📖 中篇</option>
                            <option value="long">📚 长篇</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="startAIFlow()">🪄 开始 AI 语境学习之旅</button>
                </div>
            </section>

            <section id="loadingSection" class="hidden" style="text-align: center;">
                <div class="spinner"></div>
                <h3>正在构建沉浸式英文语境...</h3>
                <p style="color: #64748b; margin-top: 15px;">AI 将同步提供译文辅助学习...</p>
            </section>

            <section id="readingSection" class="hidden">
                <div class="card">
                    <h2 id="storyTitle" style="font-size: 28px; margin-bottom: 20px;"></h2>
                    <div id="englishBox" style="line-height: 1.8; font-size: 19px; color: #334155; margin-bottom: 30px;"></div>
                    <div id="chineseBox" class="hidden" style="background: #f8fafc; padding: 25px; border-radius: 20px; color: #475569; border-left: 5px solid var(--primary); line-height: 1.9; font-size: 17px; margin-bottom: 20px;"></div>
                    
                    <div id="vocabTableSection" class="hidden" style="margin-top: 30px; border-top: 2px solid #f1f5f9; padding-top: 25px;">
                        <h3 style="margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 8px;">🎯 本次挑战词汇表</h3>
                        <div id="vocabTableBody" style="background: white; border-radius: 20px; border: 1px solid #eef2ff; overflow: hidden;"></div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button class="btn-outline" onclick="toggleZh()" style="flex: 1;">显示/隐藏翻译</button>
                        <button class="btn-primary" onclick="startPractice()" style="flex: 2;">我读完了，去挑战！</button>
                    </div>
                </div>
            </section>

            <section id="practiceSection" class="hidden">
                <div class="card">
                    <h2 style="text-align: center; margin-bottom: 30px;">单词拼图挑战</h2>
                    <p style="color: #64748b; text-align: center; margin-bottom: 20px;">将正确的单词拖拽到对应的位置（包含变形形式）</p>
                    <div style="display: flex; gap: 30px; align-items: flex-start;">
                        <div id="wordBank" style="width: 200px; flex-shrink: 0; background: #f1f5f9; border-radius: 20px; padding: 20px; max-height: 500px; overflow-y: auto;"></div>
                        <div id="practiceContent" style="flex: 1; line-height: 2.8; font-size: 19px; padding: 30px; background: #f8fafc; border-radius: 24px; border: 2px dashed #e2e8f0; min-height: 300px;"></div>
                    </div>
                    <button class="btn-outline" onclick="showSection('reading')" style="margin-top: 20px;">返回阅读</button>
                </div>
            </section>

            <section id="settingsSection" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom: 25px;">系统偏好设置</h3>
                    <div class="input-group">
                        <label>SiliconFlow API Key</label>
                        <input type="password" id="apiKeyInput">
                        <button class="btn-primary" style="margin-top: 15px;" onclick="saveApiKey()">保存并验证</button>
                    </div>
                    <div id="bookGrid" class="book-grid"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let state = {
            apiKey: localStorage.getItem('ls_key') || '',
            books: JSON.parse(localStorage.getItem('ls_books')) || [],
            currId: localStorage.getItem('ls_id') || null,
            history: JSON.parse(localStorage.getItem('ls_history')) || [],
            lastResult: null,
            todayWords: JSON.parse(localStorage.getItem('ls_todayWords')) || []
        };

        // 检查是否是同一天，如果是则清空本日单词
        function checkTodayWords() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('ls_todayDate');
            if (savedDate !== today) {
                state.todayWords = [];
                localStorage.setItem('ls_todayWords', '[]');
                localStorage.setItem('ls_todayDate', today);
            }
        }

        // 添加今日单词到本日单词表
        function addTodayWords(dict) {
            if (!dict || !Array.isArray(dict)) return;
            dict.forEach(item => {
                const exists = state.todayWords.find(w => w.w.toLowerCase() === item.w.toLowerCase());
                if (!exists) {
                    state.todayWords.push(item);
                }
            });
            localStorage.setItem('ls_todayWords', JSON.stringify(state.todayWords));
        }

        function showSection(id) {
            const sections = ['import','config','loading','reading','practice','settings'];
            sections.forEach(s => {
                const el = document.getElementById(s+'Section');
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id+'Section').classList.remove('hidden');
            document.getElementById('headerTitle').innerText = id === 'config' ? '定制学习' : (id === 'practice' ? '挑战时刻' : 'LexiStory');
        }

        function toggleCustomStyle(val) {
            const input = document.getElementById('customStyleInput');
            if(val === 'custom') { input.classList.remove('hidden'); input.focus(); } 
            else { input.classList.add('hidden'); }
        }

        function toggleZh() {
            const box = document.getElementById('chineseBox');
            box.classList.toggle('hidden');
        }

        function save() {
            localStorage.setItem('ls_key', state.apiKey);
            localStorage.setItem('ls_books', JSON.stringify(state.books));
            localStorage.setItem('ls_id', state.currId);
            localStorage.setItem('ls_history', JSON.stringify(state.history));
            updateUI();
            updateBookList();
            renderSidebar();
        }

        async function startAIFlow() {
            if(!state.apiKey) return alert("请先在设置中填写 API Key");
            const book = state.books.find(b => b.id == state.currId);
            if(!book) return alert("请先上传词库");

            let count = parseInt(document.getElementById('wordNum').value);
            count = Math.min(Math.max(count || 10, 10), 60); 

            const selected = book.words.sort(() => 0.5 - Math.random()).slice(0, count);
            const selectedModel = document.getElementById('modelSelect').value;
            
            let finalStyle = document.getElementById('storyStyle').value;
            if(finalStyle === 'custom') finalStyle = document.getElementById('customStyleInput').value || 'General';
            
            const lengthSelect = document.getElementById('storyLength');
            const lengthText = lengthSelect.options[lengthSelect.selectedIndex].text;

            showSection('loading');

            const prompt = `Task: Create an English short story and its idiomatic Chinese translation.
            Target Vocabulary: [${selected.join(',')}].
            Genre/Style: ${finalStyle}.
            Story Length: ${lengthText}.

      [UPGRADED ENGLISH STORY REQUIREMENTS]
        1. CLEAR STRUCTURE: Follow a short-novel arc (Beginning: Scene/Character -> Middle: Conflict/Tension -> Climax: Emotional Peak -> Ending: Resolution).
        2. VIVID NARRATION: Use sensory details (sight, sound, internal thoughts). Avoid flat, textbook-style narration.
        3. LOGICAL CAUSALITY: Every event must push the story forward logically. No random jumps.
        4. VOCAB INTEGRATION: Incorporate target words naturally. Wrap each in **word**.
        5. RHYTHM: Mix short and long sentences. Avoid repetitive patterns.

[中文翻译要求]
1. 核心目标：写出地道流畅的中文，读起来像母语者自然写出的文字。
2. 句式处理：
- 根据中文表达习惯灵活调整句式，长短句交错使用。
- 英文的长定语拆解为短分句，独立呈现。
- 主动语态优先，让句子有明确的行动主体。
3. 词汇选择：
- 选用日常语境下自然出现的词汇。
- 比喻和意象保留原意，用中文读者能自然理解的方式表达。
4. 结构处理：
- 根据语义逻辑自由拆分或合并句子。
- 调整语序让行文更符合中文叙事节奏。
- 段落之间保持自然的衔接与过渡。
5. 生词标注：
- 译文中的目标生词用 **词语** 包裹。
- 语义对应即可，不要求词对词位置对齐。

[案例示范 - 请学习此翻译风格]
英文原文:
In a village veiled by mist, Elara spun moonlight into thread, her loom humming like a drowsy cricket. She could concentrate so deeply that her hands seemed to displace time itself. Yet the townsfolk feared her craft, whispering it might denote witchcraft. 'Your art hinders our peace,' the elder scolded, his voice a vague rumble. One dusk, a traveler brought tales of a void where songs vanished—a curse only her threads could mend. Though fame meant little, the acclaim of saving voices stirred her. She wove a net of starlight and cast it into the abyss, imagining each recovered note as a child’s laugh. The threads glowed, separating shadow from sound, and the village remembered: magic was not a means to fear, but to heal.

地道流畅的中文翻译（标准）:
在薄雾笼罩的村庄里，埃拉拉动用月光纺成丝线，织机嗡嗡作响，像一只昏昏欲睡的蟋蟀。她凝神贯注时，双手仿佛能让时间停驻。可村民们却畏惧她的手艺，私下议论说这怕是在使巫术。“你的手艺扰了我们的安宁，”长者的斥责声低沉含混。某天黄昏，一位旅人带来了消息：有个地方，所有声音都被吞噬了——这诅咒唯有她的丝线能化解。埃拉拉从不在意名声，可拯救那些声音所带来的赞誉，还是让她心动了。她用星光织了一张网，撒入深渊。每找回一个音符，她都觉得像一个孩子在欢笑。丝线闪烁，将影子与声音剥离。村庄终于明白：魔法不是用来生畏的，而是用来治愈的。

            Output JSON only:
            { 
              "title": "Title", 
              "english": "Story with **word**", 
              "chinese": "Translation with **词汇**",
              "dict": [
                {"w": "单词", "p": "词性(如n./v.)", "m": "地道中文释义"}
              ]
            }`;

            try {
                const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${state.apiKey.trim()}`, 'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await res.json();
                let content = data.choices[0].message.content.replace(/<think>[\s\S]*?<\/think>/g, '').trim(); 
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                const result = JSON.parse(jsonMatch ? jsonMatch[0] : content);

                state.lastResult = {
                    id: Date.now(),
                    ...result,
                    displayLabel: `${new Date().getMonth()+1}/${new Date().getDate()} ${result.title.replace(/\*\*/g, '')}`
                };

                state.history.unshift(state.lastResult);
                save();
                renderReading();
            } catch(e) {
                console.error(e);
                alert("生成失败，请检查 API");
                showSection('config');
            }
        }

        function startPractice() {
            const r = state.lastResult;
            if(!r) return;

            showSection('practice');
            const container = document.getElementById('practiceContent');
            const bank = document.getElementById('wordBank');
            const matches = [...r.english.matchAll(/\*\*(.*?)\*\*/g)].map(m => m[1]);

            container.innerHTML = r.english.replace(/\*\*(.*?)\*\*/g, (match, word) => {
                return `<span class="drop-zone" data-ans="${word.toLowerCase()}"></span>`;
            });

            bank.innerHTML = '';
            [...matches].sort(() => 0.5 - Math.random()).forEach((word, index) => {
                const d = document.createElement('div');
                d.className = 'word-card';
                d.id = 'word-card-' + index;
                d.dataset.word = word;
                d.innerText = word;
                d.draggable = true;
                d.ondragstart = (e) => e.dataTransfer.setData('text', word);
                bank.appendChild(d);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.ondragover = e => e.preventDefault();
                zone.ondrop = e => {
                    const droppedWord = e.dataTransfer.getData('text');
                    if(droppedWord.toLowerCase() === zone.dataset.ans) {
                        zone.innerText = droppedWord;
                        zone.style.background = "#dcfce7";
                        zone.style.borderColor = "#22c55e";
                        zone.style.color = "#16a34a";
                        // 从单词池中移除已正确放置的单词
                        const cards = document.querySelectorAll('.word-card');
                        cards.forEach(card => {
                            if(card.dataset.word.toLowerCase() === droppedWord.toLowerCase()) {
                                card.remove();
                            }
                        });
                        checkWin();
                    }
                };
            });
        }

        function checkWin() {
            const zones = document.querySelectorAll('.drop-zone');
            if(Array.from(zones).every(z => z.innerText !== '')) {
                // 将当前词汇加入本日单词表
                const r = state.lastResult;
                if (r && r.dict) {
                    addTodayWords(r.dict);
                }
                setTimeout(() => {
                    showSection('reading');
                    renderTodayVocabTable(); // 显示本日单词表
                    alert("🌟 语境掌握完成！正在为你呈现本日单词表！");
                    document.getElementById('vocabTableSection').scrollIntoView({ behavior: 'smooth' });
                }, 500);
            }
        }

        function renderReading() {
            showSection('reading');
            const r = state.lastResult;
            if(!r) return;
            document.getElementById('storyTitle').innerText = r.displayLabel;
            document.getElementById('englishBox').innerHTML = r.english.replace(/\*\*(.*?)\*\*/g, '<span style="color: #a855f7; font-weight: 800; border-bottom: 3px solid #f3e8ff;">$1</span>');
            document.getElementById('chineseBox').innerHTML = r.chinese.replace(/\*\*(.*?)\*\*/g, '<span style="color: #a855f7; font-weight: 800; border-bottom: 3px solid #f3e8ff;">$1</span>');
            document.getElementById('chineseBox').classList.add('hidden');
            renderVocabTable();
            renderSidebar();
        }

        function renderVocabTable() {
            const r = state.lastResult;
            const container = document.getElementById('vocabTableSection');
            const tbody = document.getElementById('vocabTableBody');
            if(!r || !r.dict) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            // 先显示本次词汇表标题
            tbody.innerHTML = `<div style="grid-column: 1/-1; padding: 15px 25px; font-weight: 800; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">📖 本次挑战词汇</div>`;
            tbody.innerHTML += r.dict.map(item => `
                <div style="display: grid; grid-template-columns: 1.2fr 0.8fr 2fr; padding: 15px 25px; border-bottom: 1px solid #f8fafc; align-items: center; font-size: 15px;">
                    <span style="font-weight: 800; color: var(--primary);">${item.w}</span>
                    <span style="color: #94a3b8; font-style: italic; font-size: 13px;">${item.p}</span>
                    <span style="color: #475569;">${item.m}</span>
                </div>
            `).join('');

            // 如果有本日单词，追加显示
            if (state.todayWords.length > 0) {
                const todayCount = state.todayWords.length;
                tbody.innerHTML += `
                    <div style="grid-column: 1/-1; padding: 25px 25px 15px; font-weight: 800; color: #0f172a; font-size: 16px; display: flex; align-items: center; gap: 8px;">
                        📅 本日单词表 <span style="font-size: 12px; color: #64748b; font-weight: normal;">(共 ${todayCount} 个)</span>
                    </div>
                `;
                tbody.innerHTML += state.todayWords.map(item => `
                    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr 2fr; padding: 12px 25px; border-bottom: 1px solid #f8fafc; align-items: center; font-size: 15px; background: #f8fafc;">
                        <span style="font-weight: 800; color: var(--accent);">${item.w}</span>
                        <span style="color: #94a3b8; font-style: italic; font-size: 13px;">${item.p}</span>
                        <span style="color: #475569;">${item.m}</span>
                    </div>
                `).join('');
            }
        }

        // 专门渲染本日单词表（从练习完成后调用）
        function renderTodayVocabTable() {
            const container = document.getElementById('vocabTableSection');
            const tbody = document.getElementById('vocabTableBody');
            container.classList.remove('hidden');

            // 先显示本次词汇
            const r = state.lastResult;
            let html = '';
            if (r && r.dict && r.dict.length > 0) {
                html += `<div style="grid-column: 1/-1; padding: 15px 25px; font-weight: 800; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">📖 本次挑战词汇</div>`;
                html += r.dict.map(item => `
                    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr 2fr; padding: 15px 25px; border-bottom: 1px solid #f8fafc; align-items: center; font-size: 15px;">
                        <span style="font-weight: 800; color: var(--primary);">${item.w}</span>
                        <span style="color: #94a3b8; font-style: italic; font-size: 13px;">${item.p}</span>
                        <span style="color: #475569;">${item.m}</span>
                    </div>
                `).join('');
            }

            // 追加本日单词表
            const todayCount = state.todayWords.length;
            html += `
                <div style="grid-column: 1/-1; padding: 25px 25px 15px; font-weight: 800; color: #0f172a; font-size: 16px; display: flex; align-items: center; gap: 8px; background: linear-gradient(to right, #f0f9ff, #faf5ff); margin: 0 -25px; padding-left: 50px;">
                    📅 本日单词表 <span style="font-size: 12px; color: #64748b; font-weight: normal;">(已掌握 ${todayCount} 个)</span>
                </div>
            `;

            if (todayCount > 0) {
                html += state.todayWords.map((item, index) => `
                    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr 2fr; padding: 12px 25px; border-bottom: 1px solid #f8fafc; align-items: center; font-size: 15px; background: ${index % 2 === 0 ? '#f8fafc' : 'white'};">
                        <span style="font-weight: 800; color: var(--accent);">${item.w}</span>
                        <span style="color: #94a3b8; font-style: italic; font-size: 13px;">${item.p}</span>
                        <span style="color: #475569;">${item.m}</span>
                    </div>
                `).join('');
            } else {
                html += `<div style="grid-column: 1/-1; padding: 30px 25px; text-align: center; color: #94a3b8;">今天还没有学习单词哦～</div>`;
            }

            tbody.innerHTML = html;
        }

        function renderSidebar() {
            const list = document.getElementById('historyList');
            list.innerHTML = `<div class="section-label">📅 记忆历程</div>`;
            state.history.forEach((h, i) => {
                const isActive = state.lastResult && state.lastResult.id === h.id;
                const item = document.createElement('div');
                item.className = `nav-item ${isActive ? 'active' : ''}`;
                item.innerHTML = `
                    <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">📖 ${h.displayLabel}</div>
                    <div class="item-actions">
                        <span class="action-icon" onclick="renameHistory(${i}, event)">✎</span>
                        <span class="action-icon" onclick="deleteHistory(${i}, event)">🗑️</span>
                    </div>`;
                item.onclick = () => { state.lastResult = state.history[i]; renderReading(); };
                list.appendChild(item);
            });
        }

        function renameHistory(index, event) {
            event.stopPropagation();
            const oldName = state.history[index].displayLabel;
            const newName = prompt("请输入新的标题：", oldName);
            if (newName && newName.trim() !== "") {
                state.history[index].displayLabel = newName.trim();
                if (state.lastResult && state.lastResult.id === state.history[index].id) {
                    document.getElementById('storyTitle').innerText = newName.trim();
                }
                save();
            }
        }

        function updateUI() {
            const badge = document.getElementById('apiStatusBadge');
            badge.style.background = state.apiKey ? "#f0fdf4" : "#fee2e2";
            badge.style.color = state.apiKey ? "#16a34a" : "#ef4444";
            badge.innerText = state.apiKey ? "API 已就绪" : "API 未连接";
        }

        function updateBookList() {
            const grid = document.getElementById('bookGrid'); grid.innerHTML = '';
            state.books.forEach(b => {
                const s = document.createElement('div'); s.className = 'book-slot';
                s.innerHTML = `<button class="delete-book" onclick="deleteBook(${b.id})">×</button><div>${b.name}</div>`;
                s.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { state.currId = b.id; save(); alert('已切换：'+b.name); } };
                grid.appendChild(s);
            });
            if(state.books.length < 4) {
                const add = document.createElement('div'); add.className = 'book-slot';
                add.innerText = "+ 导入新词库";
                add.onclick = () => showSection('import');
                grid.appendChild(add);
            }
        }
        
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const words = ev.target.result.split('\n').map(w => w.trim()).filter(w => w);
                const book = { id: Date.now(), name: e.target.files[0].name, words };
                state.books.push(book); state.currId = book.id; save(); showSection('config');
            };
            reader.readAsText(e.target.files[0]);
        };

        function saveApiKey() { state.apiKey = document.getElementById('apiKeyInput').value; save(); alert("保存成功"); }
        function deleteBook(id) { state.books = state.books.filter(b => b.id !== id); save(); }
        function deleteHistory(i, e) { e.stopPropagation(); if(confirm('删除？')) { state.history.splice(i, 1); save(); } }

        window.onload = () => {
            checkTodayWords(); // 检查并初始化本日单词
            document.getElementById('apiKeyInput').value = state.apiKey;
            if(state.books.length === 0) showSection('import'); else showSection('config');
            updateUI(); updateBookList(); renderSidebar();
        };
    </script>
</body>
</html>
